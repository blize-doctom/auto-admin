<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BK Auto Admin — Asosiasi Pelayanan Bimbingan Konseling Sekolah</title>
    
    <!-- PWA Meta and Links -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="theme-color" content="#181D18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Service Worker Registration Setup -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((registration) => {
              console.log("[PWA Admin] Service Worker terdaftar dengan sukses:", registration.scope);
            })
            .catch((error) => {
              console.error("[PWA Admin] Gagal mendaftarkan Service Worker:", error);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
